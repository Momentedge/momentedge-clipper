# Topic selection for scripts/record.sh: the topics published by the in-repo
# sim camera (sim/cam_sim.sh with the default ns:='').
#
# Format: rosbag2 recorder node-parameters YAML (rosbag2_transport Recorder
# schema) — the same file a composable Recorder node accepts. record.sh reads
# the record.* topic-selection keys (topics, all/all_topics, regex,
# exclude_regex, exclude_topics) and ignores the rest; storage settings are
# owned by the script.
recorder_params_node:
  ros__parameters:
    record:
      topics:
        - /camera/image_raw             # sensor_msgs/Image, rgb8 — heavy (~190 MB/s at 1080p30)
        - /camera/camera_info           # sensor_msgs/CameraInfo
        - /camera/image_raw/compressed  # sensor_msgs/CompressedImage, JPEG debug stream
        - /camera/image_raw/ffmpeg      # ffmpeg_image_transport_msgs/FFMPEGPacket, H.265
