[workspace]
# A virtual workspace doesn't infer the resolver from member editions, so set it
# explicitly; "3" is the edition-2024 resolver. Without this Cargo falls back to
# resolver "1" and warns.
resolver = "3"
members = ["crates/r2r-sub", "crates/rclrs-sub"]

# Shared package metadata; members inherit with `version.workspace = true` etc.
[workspace.package]
version = "0.0.1"
edition = "2024"
