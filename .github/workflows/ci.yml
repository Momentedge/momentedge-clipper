# Builds, unit-tests, and runs the live ROS2 e2e suite for the recorder
# (clipper) against every working ROS2 distro on each push. A separate `fmt`
# job checks workspace formatting (rustfmt) in parallel.
#
# Each distro is one matrix leg. A leg enters that distro's nix dev shell
# (`nix develop .#<distro>`) — which supplies the ROS2 closure, r2r codegen
# env, and C toolchain — and runs the system cargo inside it, exactly as a
# developer does locally. The ROS2 closure is substituted from the self-hosted
# attic binary cache (cache.stfl.dev/momentedge, backed by Cloudflare R2) and
# pushed back at the end of each run so later legs substitute the closure
# instead of realising it from source. Cargo artifacts are cached per distro
# via Swatinem/rust-cache, which is orthogonal and remains.
#
# Scope: only clipper is built and tested (trigger-pub is not in CI).
# Distros: humble, jazzy, lyrical — the three the Rust crates build under
# (rolling cannot build r2r 0.9.6; see README "Integration tests"). The e2e step
# below runs the full suite on every leg under the `e2e` nextest profile,
# skipping only the one inherently flaky live-corruption test (via an env gate);
# the matrix comment explains why.

name: CI

# Every commit runs the matrix once: `push` fires on all branches, so each commit
# is tested. pull_request is intentionally omitted — it would re-run the whole
# matrix a second time for same-repo PR branches (a different concurrency group),
# doubling this heavy ROS2-from-source CI. Same-repo PRs still surface the push
# run's checks; add `pull_request:` if fork contributions ever need their own CI.
on:
  push:
  workflow_dispatch:

# One in-flight run per ref; a new push cancels the superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Workspace formatting gate. rustfmt only parses source, so this needs neither
  # the nix dev shell nor the ROS2 closure that the recorder matrix below sets up
  # — just a toolchain's rustfmt component. It must be a *nightly* one: rustfmt.toml
  # carries unstable options (group_imports, imports_granularity) that only nightly
  # rustfmt honours, and the dev box's system rustfmt is nightly too, so a stable
  # rustfmt here would both reject the config and disagree with locally-formatted
  # code. `components: rustfmt` keeps the install to rustfmt only — no full nightly
  # std/clippy. One cheap job checks both crates (`--all`), runs in parallel with
  # the recorder matrix, and is distro-independent.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  recorder:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-latest
    # Caps a wedged from-source nix build or a stuck `nix develop`; the nextest
    # slow-timeout only bounds individual e2e tests, not Build or nix
    # realization. Generous for the cold-cache run that builds ROS packages
    # ros.cachix.org lacks; warm-cache runs are a few minutes.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        distro: [humble, jazzy, lyrical]
        include:
          # Per-distro e2e selection (nextest filterset). corrupt_tail_health_live
          # — the live-corruption race the project flags as its one inherently
          # flaky case (README "Integration tests") — is skipped on every leg: the
          # E2E step sets CLIPPER_E2E_SKIP_FLAKY=1, which its in-test skip_flaky()
          # gate reads to skip-and-pass. Its mandatory 60 s post-damage
          # announcement misses under CI-grade timing, and nextest's default
          # fail-fast then masks the rest of the suite (beads clipper-3q8). The
          # recovery suite discovers recordings by ctime and asserts on path-free
          # log needles, so lyrical's timestamped rosbag2 filenames no longer
          # break it (beads clipper-7ys); every distro runs the full binary.
          - distro: humble
            e2e_filter: binary(e2e)
          - distro: jazzy
            e2e_filter: binary(e2e)
          - distro: lyrical
            e2e_filter: binary(e2e)
    steps:
      - uses: actions/checkout@v6

      # Installs Nix from the official releases.nixos.org source (no third-party
      # installer CDN). Flakes are enabled and the ROS2 binary cache
      # (ros.cachix.org) is added as a substituter so the upstream ROS2 packages
      # are substituted rather than compiled; the flake's own nixConfig is honoured
      # via accept-flake-config. The momentedge attic cache is wired up separately
      # by the next step.
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://ros.cachix.org
            extra-trusted-public-keys = ros.cachix.org-1:dSyZxI8geDCJrwgvCOHDoAfOm5sV1wCPjBkKL+38Rvo=
            # Harden cache.nixos.org substitution on loaded runners. The large
            # sim-distro NARs (gtk4, ffmpeg, sdl) drop mid-transfer over HTTP/2
            # ("framing layer" resets); curl's resume then hits a fatal,
            # un-retried 416, defeating the per-file retry. Forcing HTTP/1.1
            # avoids the framing resets, and a couple more attempts cover the rest.
            http2 = false
            download-attempts = 7

      # Installs the attic client, logs in with the ATTIC_TOKEN repo secret, and
      # registers the self-hosted momentedge cache (cache.stfl.dev) as a
      # substituter for this job — the sole source of the project's ROS2 closure,
      # so a run is a true test of whether that closure is cached in attic.
      # skip-push disables the action's built-in diff push; the "Push entire
      # store to attic" step at the end uploads the whole store, which keeps the
      # cache complete even across flake-input changes.
      - name: Set up momentedge attic cache
        uses: ryanccn/attic-action@v0.5
        with:
          endpoint: https://cache.stfl.dev
          cache: momentedge
          token: ${{ secrets.ATTIC_TOKEN }}
          skip-push: true

      # System Rust toolchain, used inside the nix shell — the flake deliberately
      # ships no Rust. The crates build on stable (no feature gates).
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # cargo-nextest: the required runner for the gated e2e suite, and used for
      # the unit run too for consistent output.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Caches cargo registry + this distro's target/ (the r2r build links the
      # distro's rcl/rmw, so the key is per distro).
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.distro }}

      # Realise the distro's dev shell on its own, so the ROS2 closure is
      # substituted (from momentedge / ros.cachix.org) as a distinct step. A full
      # cache hit makes this fast; a miss shows up here as a from-source build
      # rather than being hidden inside the cargo step.
      - name: Realise the ROS2 dev shell
        run: nix develop ".#${{ matrix.distro }}" --command true

      - name: Build
        run: nix develop ".#${{ matrix.distro }}" --command cargo build --locked -p clipper

      - name: Unit tests
        run: nix develop ".#${{ matrix.distro }}" --command cargo nextest run --locked -p clipper -E 'not binary(e2e)'

      # Live ROS2 e2e: real `ros2 bag record`, CLI-published triggers, real
      # Recorded announcements. Gated on CLIPPER_E2E; serialized and
      # timeout-bounded by the `e2e` nextest profile (.config/nextest.toml).
      # CLIPPER_E2E_SKIP_FLAKY=1 makes the in-test skip_flaky() gate skip the
      # flaky live-corruption race (see the matrix comment above).
      - name: E2E tests
        run: |
          nix develop ".#${{ matrix.distro }}" --command \
            env CLIPPER_E2E=1 CLIPPER_E2E_SKIP_FLAKY=1 cargo nextest run --locked -p clipper \
            --profile e2e -E '${{ matrix.e2e_filter }}'

      # Pushes the entire /nix/store to momentedge so the full ROS2 closure lands
      # in the cache even on a complete GitHub-cache restore when nothing is
      # rebuilt — the migration target is to serve the whole closure from attic
      # alone. atticd skips paths already in its upstream (cache.nixos.org), so
      # only the ROS2 and project-specific paths are actually stored. The attic
      # client and its login come from the setup step above; runs on failure too.
      #
      # The cache fronts atticd with a Cloudflare tunnel whose origin timeout is
      # ~100 s. A large ROS2 debug NAR can take longer than that for the small
      # cache host to receive, compress, and write to R2, which surfaces as an
      # HTTP 524/502; the attic client does not retry 5xx and aborts the whole
      # push on the first one. --jobs 1 serialises uploads so each large path
      # gets the host's full resources and finishes within the timeout, and the
      # retry loop resumes after a transient 5xx — atticd chunk-deduplicates
      # already-stored data, so each attempt uploads less and converges.
      - name: Push entire store to attic
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          paths=$(nix path-info --all | grep -vE '\.(drv|drv\.chroot|check|lock)$')
          for attempt in 1 2 3 4 5; do
            echo "::group::attic push attempt $attempt"
            if printf '%s\n' "$paths" | attic push --jobs 1 --stdin momentedge; then
              echo "::endgroup::"
              echo "push complete on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt hit a transient error; retrying in 15 s (atticd dedups already-stored paths)"
            sleep 15
          done
          echo "push did not fully complete after 5 attempts; momentedge is partially populated"
